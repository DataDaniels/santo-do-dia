<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santo do dia 02/07 - Santo do Dia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #764ba2;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .data {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-bottom: 30px;
        }
        .mensagem {
            line-height: 1.9;
            text-align: justify;
            color: #333;
        }
        .mensagem p { margin-bottom: 20px; }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            text-align: center;
            color: #999;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { padding: 25px; }
            h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ Santo do dia 02/07 ✨</h1>
        <p class="data">02 de julho de 2026</p>
        <div class="mensagem">
            <p>Santo do dia 02/07</p><p>Biografia em breve.</p><p>"Que a fé guie nossos passos."</p><p>Hoje celebramos Santo do dia 02/07.</p>
        </div>
        <div class="footer">
            <p>🙏 Que esta mensagem ilumine seu dia!</p>
        </div>
    </div>
</body>
</html>
